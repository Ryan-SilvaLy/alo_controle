<div *ngIf="mostrarModal" class="fixed inset-0 z-[9999] overflow-y-auto bg-black/50 p-2 sm:p-4">
  <div class="flex min-h-full items-start justify-center">
    <div class="flex w-full max-w-[64rem] flex-col rounded-lg bg-white text-black shadow-lg max-h-[calc(100dvh-1rem)] sm:max-h-[calc(100dvh-2rem)] overflow-hidden">

      <!-- HEADER FIXO -->
      <div class="shrink-0 flex items-start justify-between gap-3 border-b border-gray-300 bg-white px-4 py-3">
        <div>
          <h2 class="text-lg sm:text-xl font-semibold">Novo Item</h2>
          <p class="text-sm">
            Preencha os dados principais para cadastro no estoque.
          </p>
        </div>

        <button
          type="button"
          (click)="mostrarModal = false"
          class="shrink-0 rounded px-2 py-1 text-black hover:bg-gray-100"
          aria-label="Fechar modal"
        >
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>

      <!-- CORPO COM ROLAGEM -->
      <div class="min-h-0 flex-1 overflow-y-auto px-4 py-3">
        <form id="form-criar-item" (ngSubmit)="criarItem()" #itemForm="ngForm" class="grid gap-3 md:grid-cols-2 lg:grid-cols-3 text-sm">

          <!-- Nome -->
          <div class="md:col-span-2">
            <label class="mb-1 block font-medium">Nome *</label>
            <input
              type="text"
              name="nome"
              [ngModel]="item.nome"
              (ngModelChange)="onNomeChange($event)"
              required
              maxlength="50"
              placeholder="Ex: Mouse Óptico USB"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <!-- Tipo -->
          <div class="md:col-span-2 lg:col-span-1">
            <label class="mb-1 block font-medium">Tipo *</label>
            <div class="flex gap-2">
              <app-autocomplete-select
                name="tipo_item_id"
                [(ngModel)]="item.tipo_item_id"
                required
                [options]="tiposItem"
                [labelWith]="tipoItemLabel"
                placeholder="Buscar grupo/tipo"
                emptyText="Nenhum grupo encontrado"
              ></app-autocomplete-select>

              <button
                type="button"
                (click)="modalTipo.abrir()"
                class="rounded bg-green-600 px-3 text-sm text-white hover:bg-green-700"
                title="Novo tipo"
              >
                +
              </button>
            </div>
          </div>

          <!-- Descrição -->
          <div class="md:col-span-2 lg:col-span-3">
            <label class="mb-1 block font-medium">Descrição</label>
            <input
              type="text"
              name="descricao"
              [(ngModel)]="item.descricao"
              maxlength="120"
              placeholder="Descrição curta do item"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <!-- Linha -->
          <div>
            <label class="mb-1 block font-medium">Prateleira *</label>
            <input
              type="text"
              name="prateleira_estoque"
              [(ngModel)]="item.prateleira_estoque"
              required
              placeholder="Ex: A3"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <div>
            <label class="mb-1 block font-medium">Qtd Atual</label>
            <input
              type="number"
              name="quantidade_atual"
              [(ngModel)]="item.quantidade_atual"
              placeholder="0"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <div>
            <label class="mb-1 block font-medium">Qtd Mínima</label>
            <input
              type="number"
              name="quantidade_minima"
              [(ngModel)]="item.quantidade_minima"
              placeholder="0"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <div>
            <label class="mb-1 block font-medium">Valor Unitario</label>
            <input
              type="number"
              name="valor_unitario"
              [(ngModel)]="item.valor_unitario"
              min="0"
              step="0.01"
              placeholder="0,00"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <!-- Unidade -->
          <div>
            <label class="mb-1 block font-medium">Unidade *</label>
            <select
              name="unidade_medida"
              [(ngModel)]="item.unidade_medida"
              required
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            >
              <option disabled [ngValue]="null">Selecionar</option>
              <option *ngFor="let u of itemService.UNIDADE_MEDIDA_CHOICES" [value]="u[0]">
                {{ u[1] }}
              </option>
            </select>
          </div>

          <!-- Código -->
          <div>
            <label class="mb-1 block font-medium">Código</label>
            <div class="flex gap-2">
              <input
                type="text"
                name="codigo"
                [ngModel]="item.codigo"
                (ngModelChange)="onCodigoChange($event)"
                maxlength="8"
                class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
              />
              <button
                type="button"
                (click)="onGerarCodigoItem()"
                class="rounded bg-blue-600 px-3 text-sm text-white hover:bg-blue-700"
              >
                Gerar
              </button>
            </div>
          </div>

          <!-- Código barras -->
          <div>
            <label class="mb-1 block font-medium">Código Barras</label>
            <div class="flex gap-2">
              <input
                type="text"
                name="codigo_barras"
                [(ngModel)]="item.codigo_barras"
                readonly
                class="w-full rounded border border-gray-300 bg-gray-200 px-3 py-2"
              />
              <button
                type="button"
                (click)="onGerarCodigoBarras()"
                class="rounded bg-blue-600 px-3 text-sm text-white hover:bg-blue-700"
              >
                Gerar
              </button>
            </div>
          </div>

          <!-- INFO -->
          <div class="md:col-span-2 lg:col-span-3 rounded border border-gray-300 bg-gray-100 px-3 py-2 text-sm">
            Campos obrigatórios (*). Defina corretamente tipo, localização e unidade para evitar erros no estoque.
          </div>
        </form>
      </div>

      <!-- RODAPÉ FIXO -->
      <div class="shrink-0 flex flex-col gap-3 border-t border-gray-300 bg-white px-4 py-3 sm:flex-row sm:items-center sm:justify-between">
        <span class="text-sm">Dados básicos obrigatórios</span>

        <div class="flex flex-col gap-2 sm:flex-row sm:justify-end">
          <button
            type="button"
            (click)="mostrarModal = false"
            class="rounded bg-gray-300 px-4 py-2 text-sm hover:bg-gray-400"
          >
            Cancelar
          </button>

          <button
            type="submit"
            form="form-criar-item"
            class="rounded bg-blue-600 px-5 py-2 text-sm text-white hover:bg-blue-700"
          >
            Salvar
          </button>
        </div>
      </div>
    </div>
  </div>

  <app-modal-tipo-item #modalTipo (tipoCriado)="tipoCriado($event)"></app-modal-tipo-item>
</div>
