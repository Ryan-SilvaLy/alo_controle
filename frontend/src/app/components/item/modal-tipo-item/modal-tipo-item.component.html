<div
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center"
  *ngIf="mostrarModal"
>
  <div class="bg-white rounded-lg p-6 max-w-md w-full shadow-lg">
    <h3 class="text-xl text-black font-semibold mb-4">Criar Novo Tipo de Item</h3>
<input
  type="text"
  placeholder="Nome do Tipo"
  maxlength="50"
  [(ngModel)]="novoTipoNome"
  class="w-full px-4 py-2 border rounded mb-4 text-black"
/>

    <div class="flex justify-end gap-3">
      <button
        class="btn btn-outline-secondary"
        (click)="fechar()"
        [disabled]="carregando"
      >
        Cancelar
      </button>
      <button
        class="btn btn-primary"
        (click)="criarTipoItem()"
        [disabled]="carregando"
      >
        {{ carregando ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>
  </div>
</div>
