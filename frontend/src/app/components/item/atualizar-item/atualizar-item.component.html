<div *ngIf="mostrarModal" class="fixed inset-0 z-50 bg-black/50 p-2 sm:p-3">
  <div class="flex h-full items-center justify-center">
    <div class="w-full max-w-5xl rounded-xl bg-white text-slate-900 shadow-lg max-h-[95vh] overflow-hidden">

      <div class="sticky top-0 z-10 flex items-start justify-between gap-3 border-b border-gray-300 bg-white px-4 py-3">
        <div>
          <h2 class="text-lg sm:text-xl font-semibold">Atualizar Item</h2>
          <p class="text-sm text-slate-600">
            Revise e ajuste os dados principais do item selecionado.
          </p>
        </div>

        <button
          type="button"
          (click)="fecharModal()"
          class="shrink-0 rounded px-2 py-1 text-slate-500 hover:bg-gray-100 hover:text-slate-700"
          aria-label="Fechar modal"
        >
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>

      <div class="overflow-y-auto px-4 py-3 max-h-[calc(95vh-140px)]">
        <form
          *ngIf="form"
          id="form-atualizar-item"
          [formGroup]="form"
          (ngSubmit)="atualizar()"
          class="grid gap-3 md:grid-cols-3 text-sm"
        >
          <div>
            <label class="mb-1 block font-medium">Codigo *</label>
            <div class="flex gap-2">
              <input
                type="text"
                formControlName="codigo"
                maxlength="8"
                class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
              />
              <button
                type="button"
                (click)="onGerarCodigoItem()"
                class="rounded bg-blue-600 px-3 text-sm text-white hover:bg-blue-700"
              >
                Gerar
              </button>
            </div>
            <small *ngIf="form.get('codigo')?.invalid && form.get('codigo')?.touched" class="mt-1 block text-xs text-red-500">
              Codigo e obrigatorio.
            </small>
          </div>

          <div class="md:col-span-2">
            <label class="mb-1 block font-medium">Nome *</label>
            <input
              type="text"
              formControlName="nome"
              maxlength="100"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
            <small *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched" class="mt-1 block text-xs text-red-500">
              Nome e obrigatorio.
            </small>
          </div>

          <div class="md:col-span-3">
            <label class="mb-1 block font-medium">Descricao</label>
            <textarea
              formControlName="descricao"
              rows="2"
              maxlength="200"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            ></textarea>
          </div>

          <div>
            <label class="mb-1 block font-medium">Tipo de Item *</label>
            <div class="flex gap-2">
              <select
                formControlName="tipo_item_id"
                class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
              >
                <option [ngValue]="null" disabled>Selecionar</option>
                <option *ngFor="let tipo of tiposItem" [ngValue]="tipo.id">
                  {{ tipo.nome }}
                </option>
              </select>

              <button
                type="button"
                (click)="modalTipo.abrir()"
                class="rounded bg-green-600 px-3 text-sm text-white hover:bg-green-700"
                title="Novo tipo"
              >
                +
              </button>
            </div>
            <small *ngIf="form.get('tipo_item_id')?.invalid && form.get('tipo_item_id')?.touched" class="mt-1 block text-xs text-red-500">
              Tipo de item e obrigatorio.
            </small>
          </div>

          <div>
            <label class="mb-1 block font-medium">Prateleira</label>
            <input
              type="text"
              formControlName="prateleira_estoque"
              maxlength="50"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <div>
            <label class="mb-1 block font-medium">Unidade *</label>
            <select
              formControlName="unidade_medida"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            >
              <option *ngFor="let u of itemService.UNIDADE_MEDIDA_CHOICES" [value]="u[0]">
                {{ u[1] }}
              </option>
            </select>
          </div>

          <div>
            <label class="mb-1 block font-medium">Qtd Atual *</label>
            <input
              type="number"
              formControlName="quantidade_atual"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <div>
            <label class="mb-1 block font-medium">Qtd Minima *</label>
            <input
              type="number"
              formControlName="quantidade_minima"
              class="w-full rounded border border-gray-300 bg-gray-100 px-3 py-2"
            />
          </div>

          <div class="md:col-span-3 rounded border border-gray-300 bg-gray-100 px-3 py-2 text-sm text-slate-700">
            Atualize os dados com cuidado para manter codigo, tipo, localizacao e quantidades coerentes com o estoque.
          </div>
        </form>
      </div>

      <div class="sticky bottom-0 z-10 flex items-center justify-between gap-3 border-t border-gray-300 bg-white px-4 py-3">
        <span class="text-sm text-slate-600">Campos principais do cadastro do item</span>

        <div class="flex gap-2">
          <button
            type="button"
            (click)="fecharModal()"
            class="rounded bg-gray-300 px-4 py-2 text-sm hover:bg-gray-400"
          >
            Cancelar
          </button>

          <button
            type="submit"
            form="form-atualizar-item"
            class="rounded bg-blue-600 px-5 py-2 text-sm text-white hover:bg-blue-700"
          >
            Atualizar
          </button>
        </div>
      </div>
    </div>
  </div>

  <app-modal-tipo-item #modalTipo (tipoCriado)="tipoCriado($event)"></app-modal-tipo-item>
</div>
