<form *ngIf="pedidoForm" [formGroup]="pedidoForm" (ngSubmit)="atualizarPedido()" class="p-4 space-y-4 bg-white shadow rounded-lg text-sm">

  <!-- Dados principais do pedido -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
    <div>
      <label class="block font-medium text-gray-700 mb-1">Solicitante</label>
      <input class="w-full px-2 py-1 border rounded-md" type="text" placeholder="Nome do solicitante"
            formControlName="solicitante" maxlength="50">
      <div *ngIf="pedidoForm.get('solicitante')?.invalid && pedidoForm.get('solicitante')?.touched" 
          class="text-red-600 text-sm mt-1">
        Campo obrigatório
      </div>
    </div>

    <div>
      <label class="block font-medium text-gray-700 mb-1">Setor de Destino</label>
      <input class="w-full px-2 py-1 border rounded-md" type="text" placeholder="Setor destino"
            formControlName="setor_destino" maxlength="30">
      <div *ngIf="pedidoForm.get('setor_destino')?.invalid && pedidoForm.get('setor_destino')?.touched" 
          class="text-red-600 text-sm mt-1">
        Campo obrigatório
      </div>
    </div>

    <div>
      <label class="block font-medium text-gray-700 mb-1">Responsável do Setor</label>
      <input class="w-full px-2 py-1 border rounded-md" type="text" placeholder="Responsável"
            formControlName="responsavel_setor" maxlength="50">
      <div *ngIf="pedidoForm.get('responsavel_setor')?.invalid && pedidoForm.get('responsavel_setor')?.touched" 
          class="text-red-600 text-sm mt-1">
        Campo obrigatório
      </div>
    </div>
  </div>


  <!-- Lista de itens do pedido -->
  <div formArrayName="itens" class="space-y-4">
    <div *ngFor="let itemGroup of itens.controls; let i = index" [formGroupName]="i" class="border p-3 rounded bg-gray-50 space-y-2">

      <div>
        <label class="block font-medium text-gray-700 mb-1">Item</label>
        <select class="w-full px-2 py-1 border rounded-md" formControlName="item" (change)="onItemSelecionado(i)" required>
          <option value="">Selecione um item</option>
          <option *ngFor="let item of getItensDisponiveisParaSelect(i)" [value]="item.id">{{ item.nome }} - {{ item.codigo }}</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div>
          <label class="block font-medium text-gray-700 mb-1">Qtd. Pedida</label>
          <input class="w-full px-2 py-1 border rounded-md" type="number" formControlName="quantidade_pedida"
                 placeholder="Ex: 10" min="1" required>
        </div>

<div>
  <label class="block font-medium text-gray-700 mb-1">Últ. Entrada</label>
  <span
    class="block w-full px-2 py-1 border rounded-md bg-gray-100 cursor-not-allowed opacity-70"
  >
    {{
      itemGroup.get('ultima_entrada_estoque')?.value
        ? (itemGroup.get('ultima_entrada_estoque')?.value | date:'dd/MM/yyyy')
        : 'Sem registro'
    }}
  </span>
</div>



<div>
  <label class="block font-medium text-gray-700 mb-1">Qtd. em Estoque</label>
  <input class="w-full px-2 py-1 border rounded-md bg-gray-100 opacity-70 cursor-not-allowed" 
         type="number" 
         formControlName="quantidade_atual_estoque" readonly>
</div>

      </div>

      <div class="text-right">
        <button type="button" class="text-red-600 hover:underline text-xs" (click)="removerItem(i)">
          Remover item
        </button>
      </div>
    </div>
  </div>

  <!-- Botões finais -->
  <div class="flex flex-col md:flex-row justify-between gap-3">
    <button type="button" (click)="adicionarItem()"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-3 py-1.5 rounded">
      + Adicionar item
    </button>

<button type="button"
        (click)="abrirModalConfirmacao()"
        [disabled]="!pedidoForm.valid || itens.length === 0"
        class="bg-yellow-600 hover:bg-yellow-700 text-white font-medium px-3 py-1.5 rounded disabled:opacity-50">
  Atualizar Pedido
</button>

  </div>
</form>

<app-modal-confirmar-pedido
  [aberto]="modalConfirmacaoAberto"
  [pedido]="pedidoResumo"
  (confirmar)="atualizarPedido()"
  (cancelar)="modalConfirmacaoAberto = false">
</app-modal-confirmar-pedido>
